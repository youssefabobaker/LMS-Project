<body class="bg-background min-h-screen overflow-hidden">
<!-- Mock Background Content (Blurred) -->
<div class="fixed inset-0 z-0 flex blur-sm pointer-events-none">
<!-- Sidebar Shell -->
<aside class="flex flex-col h-screen fixed left-0 top-0 w-[270px] z-40 py-4 bg-[#001A33] border-r border-slate-800 shadow-2xl">
<div class="px-6 mb-8">
<div class="text-sky-400 font-bold text-xl tracking-tight">Lumina Admin</div>
<div class="text-slate-400 text-xs font-helper-text">Educational Portal</div>
</div>
<nav class="flex-1">
<div class="flex items-center gap-3 text-slate-400 px-6 py-4"><span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>Dashboard</div>
<div class="flex items-center gap-3 bg-[#41B3E3]/10 text-[#41B3E3] border-l-4 border-[#41B3E3] px-6 py-4"><span class="material-symbols-outlined" data-icon="school">school</span>Courses</div>
<div class="flex items-center gap-3 text-slate-400 px-6 py-4"><span class="material-symbols-outlined" data-icon="group">group</span>Students</div>
</nav>
</aside>
<!-- Top Header Shell -->
<header class="flex justify-between items-center w-full px-6 h-16 bg-white border-b border-slate-200 shadow-sm fixed top-0 left-0 pl-[270px] z-30">
<div class="font-['Work_Sans'] text-sm font-medium text-[#41B3E3]">Course Management</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-slate-400" data-icon="help">help</span>
<div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden">

</div>
</div>
</header>
<!-- Content Area -->
<main class="ml-[270px] mt-16 p-6 w-full h-[calc(100vh-64px)] overflow-hidden">
<div class="grid grid-cols-3 gap-6">
<div class="h-48 bg-white border border-slate-200 rounded-lg shadow-sm"></div>
<div class="h-48 bg-white border border-slate-200 rounded-lg shadow-sm"></div>
<div class="h-48 bg-white border border-slate-200 rounded-lg shadow-sm"></div>
</div>
</main>
</div>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-50 glass-overlay flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[921px] flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="bg-white px-8 py-5 border-b border-slate-100 flex items-center justify-between">
<h2 class="text-deepest-navy font-page-title text-[1.5rem] tracking-tight">Create New Course</h2>
<button class="text-lms-primary hover:bg-lms-primary/10 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined font-bold" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="flex-1 overflow-y-auto px-8 custom-scrollbar py-4"><form class="space-y-4">
<!-- 2-Column Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Course Title (Demonstrating Error State) -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Course Title</label>
<input class="w-full px-4 py-2 rounded-lg border-2 border-error-red focus:ring-0 focus:border-error-red transition-all outline-none text-body text-sm" placeholder="e.g. Advanced Quantum Mechanics" type="text" value="Q"/>
<p class="text-error-red font-helper-text text-xs flex items-center gap-1">
<span class="material-symbols-outlined text-xs" data-icon="error">error</span>
                                Title must be at least 5 characters long.
                            </p>
</div>
<!-- Semester -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Semester</label>
<select class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-lms-primary focus:ring-0 transition-all outline-none text-body text-sm appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 fill=%22none%22 viewBox=%220%200%2020%2020%22%3E%3Cpath stroke=%22%236b7280%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%221.5%22 d=%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E');">
<option disabled="" selected="" value="">Select Semester</option>
<option value="fall">Fall</option>
<option value="spring">Spring</option>
<option value="summer">Summer</option>
</select>
</div>
<!-- Academic Level -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Academic Level</label>
<select class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-lms-primary focus:ring-0 transition-all outline-none text-body text-sm appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 fill=%22none%22 viewBox=%220%200%2020%2020%22%3E%3Cpath stroke=%22%236b7280%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%221.5%22 d=%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E');">
<option disabled="" selected="" value="">Select Level</option>
<option value="1">Level 1</option>
<option value="2">Level 2</option>
<option value="3">Level 3</option>
<option value="4">Level 4</option>
<option value="5">Level 5</option>
</select>
</div><!-- Department -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Department</label>
<select class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-lms-primary focus:ring-0 transition-all outline-none text-body text-sm appearance-none bg-no-repeat bg-[right_1rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 fill=%22none%22 viewBox=%220%200%2020%2020%22%3E%3Cpath stroke=%22%236b7280%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%221.5%22 d=%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E');">
<option disabled="" selected="" value="">Select Department</option>
<option value="science">Science</option>
<option value="arts">Arts</option>
<option value="engineering">Engineering</option>
</select>
</div>
<!-- Credit Hours -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Credit Hours</label>
<input class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-lms-primary focus:ring-0 transition-all outline-none text-body text-sm" max="10" min="1" placeholder="e.g. 4" type="number"/>
</div>
</div>
<!-- Description (Full Width) -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Description</label>
<textarea class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-lms-primary focus:ring-0 transition-all outline-none text-body text-sm resize-none" placeholder="Provide a brief overview of the course content..." rows="2"></textarea>
</div>
<!-- Learning Outcomes (Full Width) -->
<div class="space-y-1.5">
<label class="font-work text-deepest-navy text-sm font-semibold block">Learning Outcomes</label>
<textarea class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-lms-primary focus:ring-0 transition-all outline-none text-body text-sm resize-none" placeholder="What will students achieve by the end of this course?" rows="2"></textarea>
</div>
<!-- Image Upload -->
<div class="space-y-1.5"><label class="font-work text-deepest-navy text-sm font-semibold block">Course Thumbnail</label>
<div class="flex flex-col md:flex-row items-start md:items-center gap-4 p-3 border border-slate-200 rounded-xl bg-white">
<div class="flex-shrink-0">
<div class="w-32 h-20 rounded-[10px] border border-slate-200 bg-slate-50 flex flex-col items-center justify-center overflow-hidden relative group">
<img alt="Course thumbnail preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCofq5MMR5r7-y7pmztdmUYEfU-IGiwqxGFsfGIHYKTSKiILZ3sPO92zavIufzvRbVyqo2f1CqGklILYW4xIAqGRCOpO8uc2uz5gWd7TmSpn4RAcb0VgZfpulyomkS8ULy20S71NsPi16JYxr96-qKJlaPp1LOTSUzE2cQCPYrtkTdHCfh3hvorpEC8qLy3Dp6ndFtwB24LIJrc045o4iHSrHElPt5S3d1Lb1CJobCI3FEjTLu1MT1ygbbTz4jPFxRsWJOpyr5A8pvh"/>
<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-white text-xl">delete</span>
</div>
</div>
</div>
<div class="flex-1 space-y-2">
<div class="flex flex-col gap-1">
<button class="inline-flex items-center justify-center px-4 py-1.5 rounded-lg border-2 border-deepest-navy text-deepest-navy font-work font-bold hover:bg-deepest-navy hover:text-white transition-all transform active:scale-95 w-fit text-xs" type="button">
<span class="material-symbols-outlined mr-2 text-sm">upload</span>
                Upload Image
            </button>
<p class="text-slate-400 text-[10px] font-helper-text">Recommended size: 800x450px (Max 5MB)</p>
</div>
<div class="flex items-center gap-2 text-status-active text-[10px] font-medium">
<span class="material-symbols-outlined text-xs">check_circle</span>
            image_uploaded.jpg
        </div>
</div>
</div></div>
</form></div>
<!-- Modal Footer -->
<div class="px-8 py-5 bg-slate-50 border-t border-slate-200 flex items-center justify-end gap-4">

                    Cancel
                </button>
<button class="px-8 py-2.5 rounded-lg lms-gradient text-white font-work font-bold shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all transform active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="save">save</span>
                    Save Course
                </button>
</div>
</div>
</div>
</body></html>
