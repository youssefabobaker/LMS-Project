<body class="bg-bg-light font-body-main text-on-background min-h-screen flex items-center justify-center p-4 md:p-gutter">
<!-- Manage Course Instructors Modal -->
<div class="bg-white w-full max-w-4xl rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="bg-gradient-to-r from-deepest-navy to-lms-dark px-gutter py-5 flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-lms-primary text-3xl" data-icon="assignment_ind">assignment_ind</span>
<h2 class="font-card-header text-card-header text-lms-primary">Manage Course Instructors: Advanced Algorithms</h2>

<button class="text-on-primary hover:text-lms-primary transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="p-gutter">
<!-- Top Section: Assignment Form -->
<div class="bg-surface-container-low p-6 rounded-lg mb-gutter">
<div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
<div class="md:col-span-8">
<label class="block text-deepest-navy font-semibold mb-2 text-helper-text">Select Instructor to Assign</label>
<div class="relative">
<select class="w-full h-12 bg-white border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-lms-primary focus:border-lms-primary appearance-none text-body-main">
<option disabled="" selected="" value="">Choose from eligible faculty members...</option>
<option value="1">Dr. Sarah Jenkins - Computer Science</option>
<option value="2">Prof. Michael Chen - Data Structures</option>
<option value="3">Dr. Elena Rodriguez - Software Engineering</option>
<option value="4">Prof. James Wilson - Cybersecurity</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="md:col-span-4">
<button class="w-full h-12 bg-gradient-to-r from-[#41B3E3] to-[#002D5B] text-on-primary font-bold rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity transform active:scale-95 shadow-md">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
                            Enroll Instructor
                        </button>
</div>
</div>
</div>

<div class="border border-outline-variant rounded-xl overflow-hidden bg-white shadow-sm">
<div class="overflow-x-auto custom-scrollbar">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-deepest-navy text-lms-primary">
<th class="font-table-header text-table-header px-6 py-4 border-b border-lms-primary">Instructor Name</th>
<th class="font-table-header text-table-header px-6 py-4 border-b border-lms-primary">Email</th>
<th class="font-table-header text-table-header px-6 py-4 border-b border-lms-primary">Enrolled At</th>
<th class="font-table-header text-table-header px-6 py-4 border-b border-lms-primary text-center">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
<tr class="hover:bg-[rgba(65,179,227,0.05)] transition-colors">
<td class="px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary font-bold">SJ</div>
<span class="font-semibold text-deepest-navy">Dr. Sarah Jenkins</span>
</div>
</td>
<td class="px-6 py-4 text-text-body">s.jenkins@lumina-edu.org</td>
<td class="px-6 py-4">
<span class="bg-surface-container px-3 py-1 rounded-full text-badge-label font-badge-label text-on-surface-variant">Oct 12, 2023</span>
</td>
<td class="px-6 py-4 text-center">
<button class="text-status-danger hover:bg-status-danger/10 p-2 rounded-full transition-all group" title="Unenroll">
<span class="material-symbols-outlined" data-icon="person_remove">person_remove</span>
</button>
</td>
</tr>
<tr class="hover:bg-[rgba(65,179,227,0.05)] transition-colors">

</td>

</td>

</td>

</div>
</div>
