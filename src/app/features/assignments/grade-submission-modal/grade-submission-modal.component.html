<!-- ── Modal Header ─────────────────────────────────────────── -->
<div class="modal-header grade-header">
  <h5 class="modal-title mb-0" id="gradeModalLabel">Review & Grade Submission</h5>
  <button type="button" class="btn-close-modal" (click)="cancel()" aria-label="Close">
    <i class="bi bi-x-lg"></i>
  </button>
</div>

<!-- ── Modal Body ────────────────────────────────────────────── -->
<div class="modal-body p-4">
  
  <div *ngIf="submission">
    <!-- Student Info Context -->
    <div class="mb-4 d-flex align-items-center gap-3 p-3 bg-light rounded-3 border">
      <div class="bg-white rounded-circle d-flex align-items-center justify-content-center border shadow-sm" style="width: 48px; height: 48px;">
        <i class="bi bi-person-fill fs-4 text-lms-primary"></i>
      </div>
      <div>
        <div class="fw-bold text-dark">Student Review</div>
        <div class="text-muted small">Submitted: {{ submission.submittedAt | date:'medium' }}</div>
      </div>
    </div>

    <!-- Student Answer -->
    <div *ngIf="submission.textSubmission" class="mb-4">
      <label class="section-label">STUDENT'S ANSWER</label>
      <div class="answer-box shadow-sm">
        {{ submission.textSubmission }}
      </div>
    </div>

    <!-- Attachments -->
    <div *ngIf="submission.assignmentSubmissionAttachments?.length" class="mb-4">
      <label class="section-label">ATTACHED FILES</label>
      <div class="d-flex flex-column gap-2">
        <div *ngFor="let att of submission.assignmentSubmissionAttachments" class="attachment-row">
          <a [href]="att.fileUrl" target="_blank" class="attachment-link">
            <i class="bi bi-file-earmark-text-fill fs-5 text-primary"></i>
            <span>{{ att.fileName }}</span>
          </a>
          <a [href]="att.fileUrl" target="_blank" class="btn btn-sm btn-link text-primary text-decoration-none fw-bold">
            <i class="bi bi-eye me-1"></i>View
          </a>
        </div>
      </div>
    </div>
  </div>

  <hr class="my-4 opacity-10">

  <!-- Grading Form -->
  <div class="row g-3">
    <div class="col-md-4">
      <label for="grade" class="section-label">FINAL GRADE</label>
      <div class="input-group">
        <input type="number" 
               class="form-control form-control-lg rounded-start-3" 
               id="grade" 
               [(ngModel)]="grade" 
               min="0" 
               placeholder="Score"
               [disabled]="isSubmitting">
        <span class="input-group-text bg-white text-muted fw-bold">/ {{ assignmentTotalMarks }}</span>
      </div>
    </div>

    <div class="col-12">
      <label for="feedback" class="section-label">FEEDBACK TO STUDENT</label>
      <textarea class="form-control rounded-3" 
                id="feedback" 
                rows="4" 
                [(ngModel)]="feedback" 
                [disabled]="isSubmitting"
                placeholder="Write helpful feedback or comments..."></textarea>
    </div>
  </div>

  <!-- Progress -->
  <div *ngIf="isSubmitting" class="progress mt-4" style="height: 4px;">
    <div class="progress-bar progress-bar-striped progress-bar-animated bg-info w-100"></div>
  </div>

  <!-- Error -->
  <div class="alert alert-danger d-flex align-items-center gap-2 mt-4" role="alert" *ngIf="submitError">
    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
    <div class="small">{{ submitError }}</div>
  </div>
</div>

<!-- ── Modal Footer ───────────────────────────────────────────── -->
<div class="modal-footer border-top px-4 py-3 gap-2">
  <button type="button" class="btn-cancel-modal" (click)="cancel()" [disabled]="isSubmitting">
    Cancel
  </button>
  <button type="button" class="btn-save-grade" (click)="submit()" [disabled]="isSubmitting">
    <span *ngIf="!isSubmitting">Save & Publish Grade</span>
    <span *ngIf="isSubmitting"><i class="spinner-border spinner-border-sm me-1"></i>Saving…</span>
  </button>
</div>
