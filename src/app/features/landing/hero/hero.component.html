<section class="hero-section d-flex align-items-center">
  <!-- Animated background orbs -->
  <div class="hero-bg-orb hero-orb-1"></div>
  <div class="hero-bg-orb hero-orb-2"></div>
  <div class="hero-bg-orb hero-orb-3"></div>
  <div class="hero-bg-orb hero-orb-4"></div>
  <div class="hero-bg-orb hero-orb-5"></div>
  <div class="hero-bg-orb hero-orb-6"></div>
  <!-- Sparkle particles -->
  <div class="hero-particle hero-p1"></div>
  <div class="hero-particle hero-p2"></div>
  <div class="hero-particle hero-p3"></div>
  <div class="hero-particle hero-p4"></div>
  <div class="hero-particle hero-p5"></div>
  <div class="hero-particle hero-p6"></div>
  <div class="hero-particle hero-p7"></div>
  <div class="hero-particle hero-p8"></div>

  <div class="container hero-container">
    <div class="row align-items-center">

      <!-- Left: Text Content -->
      <div class="col-lg-6 hero-text-col">

        <h6 class="hero-eyebrow animate-fade-up" style="--delay: 0.1s;">
          Illuminating Education, Intelligently Secured
        </h6>

        <h1 class="hero-headline animate-fade-up" style="--delay: 0.2s;">
          Elevate Your<br>
          Learning with<br>
          <span class="hero-gradient-text">{{ displayedWord }}&#8203;</span>
        </h1>

        <p class="hero-subheadline animate-fade-up" style="--delay: 0.35s;">
          The next generation LMS designed for academic excellence,
          powered by advanced <strong>AI Proctoring</strong> technology.

        </p>

        <div class="d-flex justify-content-center justify-content-lg-start">
          <div class="animate-fade-up d-inline-flex flex-column gap-3" style="--delay: 0.5s; margin-bottom: 40px;">
            <div class="d-flex gap-3 flex-wrap justify-content-center justify-content-lg-start">
              <button class="btn-lumina-hero-primary" routerLink="/login">
                <span>Get Started</span>
                <i class="bi bi-arrow-right-circle-fill btn-icon"></i>
              </button>
              <button type="button" class="btn-lumina-hero-secondary" (click)="scrollToFeatures()">
                <span>See Features</span>
              </button>
            </div>
            <button type="button" class="btn-lumina-hero-secondary w-100 justify-content-center" routerLink="/desktop-app">
              <i class="bi bi-windows btn-icon-left me-2"></i>
              <span>Get Desktop Exam App</span>
            </button>
          </div>
        </div>


      </div>

      <!-- Right: Graphic -->
      <div class="col-lg-6 hero-graphic-col animate-fade-left" style="--delay: 0.3s;">
        <div class="hero-image-wrapper">
          <!-- Decorative ring -->
          <div class="hero-ring hero-ring-outer"></div>
          <div class="hero-ring hero-ring-inner"></div>
          <!-- Floating feature pills -->
          <div class="hero-pill hero-pill-1 floating-pill">
            <i class="bi bi-shield-check"></i>
            <span>AI Proctored</span>
          </div>
          <div class="hero-pill hero-pill-2 floating-pill">
            <i class="bi bi-graph-up-arrow"></i>
            <span>Live Analytics</span>
          </div>
          <div class="hero-pill hero-pill-3 floating-pill">
            <i class="bi bi-mortarboard-fill"></i>
            <span>Smart Learning</span>
          </div>
          <div class="hero-pill hero-pill-4 floating-pill">
            <i class="bi bi-robot"></i>
            <span>Auto Grading</span>
          </div>
          <div class="hero-pill hero-pill-5 floating-pill">
            <i class="bi bi-camera-video"></i>
            <span>Live Classes</span>
          </div>
          <div class="hero-pill hero-pill-6 floating-pill">
            <i class="bi bi-ui-checks"></i>
            <span>Interactive Exams</span>
          </div>
          <!-- Main image -->
          <img src="assets/logo(1).png" alt="Lumina AI Platform" class="hero-main-img floating">
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom wave -->
  <div class="hero-wave">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path fill="#ffffff" d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" />
    </svg>
  </div>
</section>
